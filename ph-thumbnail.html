<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }
  /* Subtle radial glow behind the claw */
  body::before {
    content: '';
    position: absolute;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
    top: 20px;
    left: 30px;
    border-radius: 50%;
  }
  .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .claw-icon {
    width: 110px;
    height: 100px;
    position: relative;
  }
  .claw-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 12px rgba(139,92,246,0.5));
  }
  .text {
    color: white;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(139,92,246,0.4);
  }
  .subtitle {
    color: rgba(139,92,246,0.9);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="logo-container">
    <div class="claw-icon">
      <svg viewBox="0 0 120 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Left pincer -->
        <path d="M20 15 C10 5, -2 20, 12 40 C18 50, 25 55, 35 58 L42 52 C32 48, 24 42, 20 35 C14 24, 20 18, 25 20 C28 22, 30 28, 32 35 L38 32 C35 22, 30 12, 20 15Z"
              fill="url(#grad1)" />
        <!-- Right pincer -->
        <path d="M100 15 C110 5, 122 20, 108 40 C102 50, 95 55, 85 58 L78 52 C88 48, 96 42, 100 35 C106 24, 100 18, 95 20 C92 22, 90 28, 88 35 L82 32 C85 22, 90 12, 100 15Z"
              fill="url(#grad1)" />
        <!-- Body / main arm -->
        <path d="M35 58 C40 62, 48 68, 60 70 C72 68, 80 62, 85 58 L88 65 C82 72, 72 80, 60 82 C48 80, 38 72, 32 65 Z"
              fill="url(#grad2)" />
        <!-- Center connection -->
        <path d="M42 52 C50 56, 55 58, 60 58 C65 58, 70 56, 78 52 L85 58 C75 64, 68 66, 60 66 C52 66, 45 64, 35 58 Z"
              fill="url(#grad2)" />
        <!-- Lower body -->
        <path d="M38 72 C45 82, 52 90, 60 95 C68 90, 75 82, 82 72 L78 68 C72 78, 66 85, 60 88 C54 85, 48 78, 42 68 Z"
              fill="url(#grad3)" />
        <defs>
          <linearGradient id="grad1" x1="0" y1="0" x2="120" y2="110">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
          <linearGradient id="grad2" x1="30" y1="50" x2="90" y2="80">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
          <linearGradient id="grad3" x1="40" y1="70" x2="80" y2="95">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#6d28d9"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="text">MyClaw</div>
    <div class="subtitle">AI Assistant</div>
  </div>
</body>
</html>
